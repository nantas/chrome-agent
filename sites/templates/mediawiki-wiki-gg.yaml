# wiki.gg MediaWiki Strategy

## Platform Notes

wiki.gg-hosted MediaWiki. Typically low protection, MediaWiki API available.

## Extraction Rules

- Content selector: `#mw-content-text`
- Remove edit sections, TOC, nav-box, and nav-header before conversion
- Resolve internal wiki links to full URLs via `wiki_domain`
- Filter out font images (Font_TeamMeat) and DLC indicator images

## Image Filtering

Default skip patterns for wiki.gg sites:
- `Font_TeamMeat` — Decorative font images used for headings
- `Dlc_.*indicator` — DLC expansion indicator icons

## Cleanup Selectors

Default elements to remove during HTML cleanup:
- `.mw-editsection` — Edit section links
- `.toc` / `#toc` — Table of contents
- `.hatnote` — Hatnote banners
- `.nav-box` — Navigation box tables
- `.nav-header` — Navigation header elements
