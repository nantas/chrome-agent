# Fandom MediaWiki Strategy

## Platform Notes

Fandom-hosted MediaWiki. Cloudflare Managed Challenge on HTML pages; MediaWiki API endpoints are typically unaffected. Lazy-loaded images with base64 placeholders.

## Extraction Rules

- Content selector: `#mw-content-text`
- Fix lazyload images: replace `data:image/gif;base64` src with `data-src`
- Remove Fandom infobox visual tables (portable-infobox, item-table-* classes)
- Convert ambox notices to text
- Unwrap image wrapper links
- Resolve internal wiki links to `.md` files
