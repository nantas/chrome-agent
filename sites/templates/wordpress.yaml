# WordPress Strategy

## Platform Notes

WordPress site with REST API at `/wp-json/`. Content typically in `article` or `.entry-content`. Standard theme structures vary; verify selectors per site.

## Extraction Rules

- Content selector: `article`, `.entry-content`, `.post-content`, or `main`
- Remove comment sections and sidebar widgets
- Remove ad blocks if present
- Normalize spaces and blank lines
